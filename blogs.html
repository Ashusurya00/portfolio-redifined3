<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blogs | Ashutosh Suryawanshi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #0a0a1a, #0f0c29, #1a1a40);
            --text-primary: white;
            --text-secondary: #ccc;
            --btn-bg: #7b2ff7;
            --btn-hover: #ff6ec4;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.8s ease;
        }

        /* Navbar */
        nav {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
        }

        .nav-links {
            display: none;
            flex-direction: column;
            gap: 0;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            width: 100%;
            text-align: center;
            position: absolute;
            top: 100%;
            right: 0;
            padding: 1rem 0;
        }

        .nav-links.show {
            display: flex;
        }

        .nav-links a {
            display: block;
            padding: 0.75rem 0;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s, color 0.3s, box-shadow 0.3s;
        }

        .nav-links a:hover {
            transform: scale(1.05);
            color: #ffd700;
            box-shadow: 0 0 8px var(--btn-bg), 0 0 16px var(--btn-hover);
        }

        @media (min-width: 768px) {
            .nav-links {
                display: flex !important;
                flex-direction: row;
                position: static;
                background: transparent;
                width: auto;
                gap: 1.5rem;
                padding: 0;
            }
        }

        .theme-btn,
        .menu-btn {
            background: var(--btn-bg);
            color: #000;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 0 4px var(--btn-bg), 0 0 8px var(--btn-bg);
            transition: all 0.3s ease;
        }

        .theme-btn:hover,
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 6px var(--btn-hover), 0 0 12px var(--btn-hover);
        }

        /* Blog Cards */
        .blog-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 2rem;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .blog-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.3);
        }

        .blog-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .blog-badge {
            display: inline-block;
            margin: 4px 4px 4px 0;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-glow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.4rem;
            border-radius: 9999px;
            font-weight: 600;
            background: var(--btn-bg);
            color: #000;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 8px var(--btn-hover), 0 0 16px var(--btn-hover);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav>
        <div class="text-2xl font-bold">Ashutosh Suryawanshi</div>
        <div class="flex items-center gap-3">
            <div id="nav-links" class="nav-links">
                <a href="index.html"><i data-feather="home"></i> Home</a>
                <a href="aboutme.html"><i data-feather="user"></i> About</a>
                <a href="projects.html"><i data-feather="folder"></i> Projects</a>
                <a href="blogs.html"><i data-feather="book"></i> Blog</a>
                <a href="skills.html"><i data-feather="award"></i> Skills & Exp</a>
                <a href="resume.html"><i data-feather="file-text"></i> Resume</a>
                <a href="contact.html"><i data-feather="mail"></i> Contact</a>
            </div>
            <button class="menu-btn block md:hidden" onclick="toggleMenu()"><i data-feather="menu"></i></button>
            <button class="theme-btn hidden sm:flex" onclick="changeTheme()"><i data-feather="moon"></i></button>
        </div>
    </nav>

    <!-- Blogs Section -->
    <section class="pt-36 px-4 sm:px-6 pb-20">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-12">My Blogs</h1>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Blog Card Example -->
                <div class="blog-card">
                    <img src="blog1.jpg" alt="Blog 1" />
                    <div class="p-6">
                        <h2 class="text-2xl font-bold mb-2">Introduction to AI & ML</h2>
                        <p class="text-gray-200 mb-4 text-sm md:text-base">
                            Beginner-friendly guide explaining AI, ML concepts, and their applications.
                        </p>
                        <div class="mb-4">
                            <span class="blog-badge">AI</span>
                            <span class="blog-badge">ML</span>
                            <span class="blog-badge">Data Science</span>
                        </div>
                        <a href="#" class="btn-glow"><i data-feather="book-open"></i> Read More</a>
                    </div>
                </div>
                <!-- Duplicate / Add more cards as needed -->
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/feather-icons"></script>
    <script src="theme.js"></script>
    <script>
        feather.replace();
        const navLinks = document.getElementById("nav-links");
        function toggleMenu() {
            navLinks.classList.toggle("show");
        }
    </script>
</body>

</html>
